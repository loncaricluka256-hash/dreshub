<template id="product-card-template">
  <article class="product-card reveal" data-product-id="{{id}}">
    <div class="card-media">
      <span class="badge {{badgeClass}}">{{badge}}</span>
      <button class="favorite-button {{favoriteClass}}" type="button" data-favorite="{{id}}" aria-label="{{favoriteLabel}}" aria-pressed="{{favoritePressed}}"><span aria-hidden="true">{{favoriteIcon}}</span></button>
      <a href="product.html?id={{id}}" aria-label="Otvori {{name}}"><img src="{{image}}" data-original-src="{{originalImage}}" alt="{{name}}" loading="lazy" decoding="async" width="520" height="520" onerror="this.onerror=null;this.src=this.dataset.originalSrc"></a>
    </div>
    <div class="card-content">
      <p class="card-club">{{club}}</p>
      <a href="product.html?id={{id}}"><h3>{{name}}</h3></a>
      <dl class="product-meta"><div><dt>{{metaLabel1}}</dt><dd>{{player}}</dd></div><div><dt>{{metaLabel2}}</dt><dd>{{version}}</dd></div><div><dt>{{metaLabel3}}</dt><dd>{{sizes}}</dd></div></dl>
      <div class="stock-status {{stockClass}}"><span></span>{{stockLabel}}</div>
      <div class="card-footer"><div class="price-wrap">{{oldPrice}}<strong>{{price}}</strong></div><button class="button button-primary reserve-button" type="button" data-reserve="{{id}}" {{disabled}}>Rezerviraj</button></div>
    </div>
  </article>
</template>
