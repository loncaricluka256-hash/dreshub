<dialog class="lightbox" data-component="lightbox" aria-label="Galerija proizvoda">
  <button class="lightbox-close" type="button" data-lightbox-action="close" aria-label="Zatvori galeriju">×</button>
  <button class="lightbox-arrow previous" type="button" data-lightbox-action="previous" aria-label="Prethodna slika">‹</button>
  <figure><img src="" alt="Povećani prikaz proizvoda" data-lightbox-image><figcaption data-lightbox-counter></figcaption></figure>
  <button class="lightbox-arrow next" type="button" data-lightbox-action="next" aria-label="Sljedeća slika">›</button>
</dialog>
