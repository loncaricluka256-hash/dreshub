<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Pretražite DresHub ponudu nogometnih dresova."><title>Dresovi | DresHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/navbar.css"><link rel="stylesheet" href="css/cards.css"><link rel="stylesheet" href="css/filters.css"><link rel="stylesheet" href="css/footer.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="notice"><span>Besplatna dostava za 2 ili više dresova</span><a href="contact.html">Trebate pomoć? Kontaktirajte nas</a></div><div data-navbar-slot></div>
  <main class="page-shell inner-page">
    <header class="page-heading"><p class="eyebrow">Cijela kolekcija</p><h1>Pronađite svoj dres</h1><p>Pretražite po klubu, ligi, reprezentaciji ili igraču.</p></header>
    <form class="catalog-controls" data-catalog-form>
      <div class="search-field">
        <label class="visually-hidden" for="catalog-search">Pretraži dresove</label><span aria-hidden="true">⌕</span>
        <input id="catalog-search" name="query" type="search" placeholder="Pretraži klub, ligu, igrača ili dres…" autocomplete="off" autofocus aria-autocomplete="list" aria-controls="search-suggestions">
        <div class="search-suggestions" id="search-suggestions" data-search-suggestions role="listbox" hidden></div>
      </div>
      <div class="filter-actions">
        <div class="primary-filters">
          <label><span>Vrsta</span><select name="type"><option value="all">Sve</option><option value="club">Klubovi</option><option value="national">Reprezentacije</option></select></label>
          <label><span>Veličina</span><select name="size"><option value="all">Sve veličine</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option></select></label>
          <label><span>Sortiraj</span><select name="sort"><option value="newest">Najnovije</option><option value="price-asc">Najjeftinije</option><option value="price-desc">Najskuplje</option><option value="name-asc">Naziv A–Z</option><option value="name-desc">Naziv Z–A</option></select></label>
        </div>
        <button class="filter-toggle" type="button" data-filter-toggle aria-expanded="false">Prikaži sve filtere <span>＋</span></button>
        <button class="mobile-filter-toggle" type="button" data-mobile-filter-toggle aria-expanded="false">Filtriraj <span>⚙</span></button>
      </div>
      <div class="advanced-filters" data-advanced-filters aria-hidden="true">
        <div class="filter-panel">
          <header><div><p class="eyebrow">Precizniji odabir</p><h2>Filteri</h2></div><button type="button" data-filter-close aria-label="Zatvori filtre">×</button></header>
          <div class="filter-bar">
            <label><span>Verzija</span><select name="version"><option value="all">Sve</option><option>Fan Version</option><option>Player Version</option><option>Retro</option></select></label>
            <label><span>Cijena</span><select name="price"><option value="all">Sve cijene</option><option value="under40">Do 40 €</option><option value="40to45">40–45 €</option><option value="over45">Više od 45 €</option></select></label>
            <label><span>Dostupnost</span><select name="availability"><option value="all">Sve</option><option value="available">Na stanju</option><option value="sold">Rasprodano</option></select></label>
          </div>
          <button class="reset-filters" type="reset">Poništi sve filtere</button>
        </div>
      </div>
    </form>
    <div class="section-heading"><h2>Dresovi</h2><span class="product-count" data-product-count aria-live="polite"></span></div><div class="product-grid" data-product-grid><p class="loading">Učitavanje dresova…</p></div>
  </main>
  <div data-footer-slot></div><div data-reservation-slot></div><div data-lightbox-slot></div><script type="module" src="js/app.js"></script>
</body>
</html>
